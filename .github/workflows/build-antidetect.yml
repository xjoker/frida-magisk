name: Build antidetect module

on:
  push:
    tags:
      - v*-antidetect
  workflow_dispatch:
    inputs:
      antidetect_version:
        description: Antidetect asset version to package
        required: true
        default: 17.9.1
      asset_release_tag:
        description: Optional release tag in this repository containing owned antidetect assets
        required: false
        default: ""
      asset_archive_name:
        description: Owned asset archive name; supports {version}
        required: false
        default: "frida-antidetect-assets-{version}.tar.xz"
      allow_unverified:
        description: Allow assets without SHA-256 verification
        required: true
        type: boolean
        default: false
      publish_release:
        description: Publish or update GitHub Release v<version>-antidetect
        required: true
        type: boolean
        default: false
      profile_overrides:
        description: Optional KEY=VALUE lines applied before the ANTIDETECT_PROFILE secret
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve antidetect version
        env:
          CONFIGURED_ANTIDETECT_VERSION: ${{ vars.ANTIDETECT_VERSION }}
        shell: bash
        run: |
          version="${{ inputs.antidetect_version }}"
          if [[ -z "$version" && "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" == v*-antidetect ]]; then
            version="${GITHUB_REF_NAME#v}"
            version="${version%-antidetect}"
          fi
          if [[ -z "$version" ]]; then
            version="$CONFIGURED_ANTIDETECT_VERSION"
          fi
          if [[ -z "$version" ]]; then
            echo "antidetect_version input or ANTIDETECT_VERSION repository variable is required." >&2
            exit 1
          fi
          version="${version#v}"

          echo "FRIDA_VERSION=$version" >> "$GITHUB_ENV"
          echo "ANTIDETECT_VERSION=$version" >> "$GITHUB_ENV"
          echo "FRIDA_PACKAGE_FLAVOR=antidetect" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=v$version-antidetect" >> "$GITHUB_ENV"

          if [[ "${{ inputs.allow_unverified }}" == "true" ]]; then
            echo "ANTIDETECT_ALLOW_UNVERIFIED=1" >> "$GITHUB_ENV"
          fi
          echo "Using antidetect asset version $version"

      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build zip unzip xz-utils curl gzip

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"

      - name: Build antidetect module
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_ASSET_RELEASE_TAG: ${{ inputs.asset_release_tag }}
          INPUT_ASSET_ARCHIVE_NAME: ${{ inputs.asset_archive_name }}
          INPUT_PROFILE_OVERRIDES: ${{ inputs.profile_overrides }}
          SECRET_ANTIDETECT_PROFILE: ${{ secrets.ANTIDETECT_PROFILE }}
          CONFIGURED_ASSET_RELEASE_TAG: ${{ vars.ANTIDETECT_ASSET_RELEASE_TAG }}
          CONFIGURED_ASSET_ARCHIVE_NAME: ${{ vars.ANTIDETECT_ASSET_ARCHIVE_NAME }}
        shell: bash
        run: |
          profile="$RUNNER_TEMP/antidetect-profile.env"
          : > "$profile"
          if [[ -n "$INPUT_PROFILE_OVERRIDES" ]]; then
            printf '%s\n' "$INPUT_PROFILE_OVERRIDES" >> "$profile"
          fi
          if [[ -n "$SECRET_ANTIDETECT_PROFILE" ]]; then
            printf '%s\n' "$SECRET_ANTIDETECT_PROFILE" >> "$profile"
          fi
          chmod 0600 "$profile"
          if [[ -s "$profile" ]]; then
            export ANTIDETECT_PROFILE_FILE="$profile"
          fi

          export FRIDA_ASSET_DIR="$PWD/assets/antidetect"
          asset_release_tag="${INPUT_ASSET_RELEASE_TAG:-$CONFIGURED_ASSET_RELEASE_TAG}"
          if [[ -n "$asset_release_tag" ]]; then
            archive_pattern="${INPUT_ASSET_ARCHIVE_NAME:-${CONFIGURED_ASSET_ARCHIVE_NAME:-frida-antidetect-assets-{version}.tar.xz}}"
            archive_name="${archive_pattern//\{version\}/$ANTIDETECT_VERSION}"
            mkdir -p "$PWD/build/antidetect-assets"
            gh release download "$asset_release_tag" \
              --pattern "$archive_name" \
              --dir "$PWD/build/antidetect-assets"
            gh release download "$asset_release_tag" \
              --pattern "$archive_name.sha256" \
              --dir "$PWD/build/antidetect-assets" || true
            export ANTIDETECT_ASSET_ARCHIVE="$PWD/build/antidetect-assets/$archive_name"
          fi
          bash scripts/prepare-antidetect-assets.sh
          scripts/build-zygisk-injector.sh
          for abi in ${MODULE_ABIS:-universal arm64-v8a armeabi-v7a x86 x86_64}; do
            MODULE_ABI="$abi" scripts/build-module.sh
          done
          for zip in dist/frida-magisk-antidetect-*.zip; do
            scripts/verify-antidetect-package.sh "$zip"
          done

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: frida-magisk-antidetect-${{ env.FRIDA_VERSION }}
          path: |
            dist/frida-magisk-antidetect-*.zip
            dist/frida-magisk-antidetect-*.zip.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="$RELEASE_TAG"
          notes="Automated frida-magisk antidetect build for asset version $FRIDA_VERSION."$'\n\n'"Assets use this repository's owned antidetect server and Gadget build outputs, plus this repository's Zygisk injector and module template."$'\n\n'"This build reduces common static Frida surfaces but is not a guarantee against target-specific anti-tamper checks."
          if [[ -n "${ANTIDETECT_ALLOW_UNVERIFIED:-}" ]]; then
            notes="$notes"$'\n\n'"Note: antidetect assets were downloaded without SHA-256 verification."
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/frida-magisk-antidetect-*.zip dist/frida-magisk-antidetect-*.zip.sha256 --clobber
          else
            gh release create "$tag" dist/frida-magisk-antidetect-*.zip dist/frida-magisk-antidetect-*.zip.sha256 \
              --target "$GITHUB_SHA" \
              --title "$tag" \
              --notes "$notes"
          fi
